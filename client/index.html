<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'self'; script-src 'self'; connect-src wss://copilot.mithrandirea.info; img-src 'self' data:; font-src 'self'" />
  <title>Copilot Remote</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/components.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Barre de statut -->
  <header id="header">
    <span id="app-title">Copilot Remote</span>
    <div id="header-actions">
      <span id="status-badge" class="badge disconnected" aria-live="polite">Déconnecté</span>
      <select id="model-select" aria-label="Modèle LLM" title="Modèle LLM">
        <option value="gpt-4o">gpt-4o</option>
        <option value="claude-sonnet">claude-sonnet</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
      </select>
      <button id="clear-btn" type="button" aria-label="Vider l'historique" title="Vider l'historique">&#128465;</button>
    </div>
  </header>

  <!-- Écran de configuration (premier lancement) -->
  <div id="setup-screen" role="main">
    <h2>Configuration</h2>
    <label for="server-url-input">URL du serveur</label>
    <input id="server-url-input" type="url" placeholder="wss://votre-domaine/ws/mobile"
      autocomplete="off" spellcheck="false" />
    <label for="token-input">Token d'authentification</label>
    <input id="token-input" type="password" placeholder="AUTH_SECRET_TOKEN"
      autocomplete="off" />
    <button id="save-config-btn">Enregistrer et connecter</button>
    <button id="cancel-config-btn" hidden>Annuler</button>
    <p id="setup-error" class="error" aria-live="assertive"></p>
  </div>

  <!-- Écran de chat -->
  <main id="chat-screen" hidden>
    <!-- Zone de messages -->
    <div id="chat-log" role="log" aria-live="polite" aria-label="Messages"></div>

    <!-- Barre de saisie -->
    <footer id="input-bar">
      <form id="chat-form" autocomplete="off">
        <textarea id="message-input" placeholder="Votre message…" rows="1"
          aria-label="Message" required></textarea>
        <button type="submit" id="send-btn" aria-label="Envoyer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
        <button id="stop-btn" type="button" aria-label="Arrêter la génération" hidden>&#9632;</button>
      </form>
      <button id="settings-btn" aria-label="Paramètres">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
            a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
            A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
            l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
            A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
            l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
            a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
            l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
            a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </footer>
  </main>

  <!-- DOMPurify + marked.js locaux — pas de CDN (CSP strict) -->
  <script src="purify.min.js"></script>
  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
