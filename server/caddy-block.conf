# --- Copilot Remote Bridge ---
# À ajouter dans /opt/n8n/Caddyfile sur le VPS.
# Après ajout : docker exec caddy caddy reload --config /etc/caddy/Caddyfile
your-bridge-domain.example.com {
    encode gzip

    # En-têtes de sécurité
    header {
        # HSTS — force HTTPS pour 1 an
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        # Interdit l'intégration dans des iframes
        X-Frame-Options "DENY"
        # Empêche le sniffing de type MIME
        X-Content-Type-Options "nosniff"
        # Ne pas envoyer le Referer vers d'autres origines
        Referrer-Policy "no-referrer"
        # Restreint les API navigateur inutiles
        Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
        # CSP : seules les connexions WSS vers ce sous-domaine sont autorisées
        Content-Security-Policy "default-src 'none'; connect-src 'self' wss://your-bridge-domain.example.com; frame-ancestors 'none'"
        # Supprime les en-têtes d'information serveur
        -Server
        -X-Powered-By
    }

    # Reverse proxy vers le conteneur FastAPI (WebSocket géré nativement par Caddy 2).
    # flush_interval -1 désactive la bufferisation — indispensable pour les connexions
    # WebSocket et SSE longue durée (sans ça, Caddy peut bloquer les trames en attente
    # de remplissage du buffer interne).
    reverse_proxy copilot-bridge:8765 {
        flush_interval -1
        transport http {
            # Timeout de connexion TCP vers le backend — protège contre un démarrage lent
            dial_timeout 10s
        }
    }

    # Note : le rate limiting natif n'est pas disponible dans Caddy CE standard.
    # Si le plugin caddy-rate-limit est compilé dans l'image, ajouter :
    #   rate_limit {
    #       zone dynamic {
    #           key {remote_host}
    #           events 30
    #           window 1m
    #       }
    #   }
}
