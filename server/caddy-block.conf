# --- Copilot Remote Bridge ---
# À ajouter dans /opt/n8n/Caddyfile sur le VPS.
# Après ajout : docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
#
# Prérequis : déposer les fichiers du client mobile dans le volume caddy_data :
#   rsync -avz client/ root@<VPS_IP>:/opt/n8n/caddy_data/www/
#
# Note volume Docker : /opt/n8n/caddy_data est monté dans le conteneur Caddy comme /data.
# Les fichiers statiques doivent donc être dans /opt/n8n/caddy_data/www/ sur l'hôte,
# ce qui correspond à /data/www dans le conteneur.
#
# Piège bind-mount : si le fichier Caddyfile est remplacé (mv/>) sur l'hôte après démarrage
# du conteneur, le conteneur voit encore l'ancien inode. Toujours modifier en place (sed)
# ou utiliser : cat /opt/n8n/Caddyfile | docker exec -i caddy sh -c "cat > /etc/caddy/Caddyfile"
# puis caddy reload.
your-bridge-domain.example.com {
    encode gzip

    # En-têtes de sécurité — appliqués à toutes les réponses
    header {
        # HSTS — force HTTPS pour 1 an
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        # Interdit l'intégration dans des iframes
        X-Frame-Options "DENY"
        # Empêche le sniffing de type MIME
        X-Content-Type-Options "nosniff"
        # Ne pas envoyer le Referer vers d'autres origines
        Referrer-Policy "no-referrer"
        # Restreint les API navigateur inutiles
        Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
        # CSP : scripts/styles locaux uniquement, connexions WSS vers ce domaine
        Content-Security-Policy "default-src 'none'; style-src 'self'; script-src 'self'; connect-src 'self' wss://your-bridge-domain.example.com; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'"
        # Supprime les en-têtes d'information serveur
        -Server
        -X-Powered-By
    }

    # Endpoints WebSocket → FastAPI
    # flush_interval -1 : désactive la bufferisation — indispensable pour le streaming WS
    handle /ws/* {
        reverse_proxy copilot-bridge:8765 {
            flush_interval -1
            transport http {
                dial_timeout 10s
            }
        }
    }

    # Health check → FastAPI
    handle /health {
        reverse_proxy copilot-bridge:8765
    }

    # Client mobile → fichiers statiques servis par Caddy
    # /data/www correspond au volume Docker caddy_data monté en /data dans le conteneur
    # Fichiers à déposer sur l'hôte dans /opt/n8n/caddy_data/www/
    handle {
        root * /data/www
        file_server
    }
}
