services:
  copilot-bridge:
    build: .
    container_name: copilot-bridge
    restart: unless-stopped
    env_file: .env
    # Port non exposé sur l'hôte — accessible uniquement via Caddy sur n8n_proxy
    expose:
      - "8765"
    networks:
      - n8n_proxy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  # Réseau externe partagé — créé par le stack n8n
  n8n_proxy:
    external: true
