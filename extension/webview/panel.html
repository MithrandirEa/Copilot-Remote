<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP injectée dynamiquement par l'extension TypeScript — {{CSP_NONCE}} remplacé par une nonce aléatoire -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'nonce-{{CSP_NONCE}}'; script-src 'nonce-{{CSP_NONCE}}'; img-src data:; font-src 'self'" />
  <title>Copilot Remote</title>
  <link rel="stylesheet" href="{{THEME_URI}}" nonce="{{CSP_NONCE}}" />
  <link rel="stylesheet" href="{{COMPONENTS_URI}}" nonce="{{CSP_NONCE}}" />
  <link rel="stylesheet" href="{{PANEL_CSS_URI}}" nonce="{{CSP_NONCE}}" />
</head>
<body>
  <!-- Barre de statut -->
  <header id="header">
    <span id="app-title">Copilot Remote</span>
    <div id="header-actions">
      <span id="status-badge" class="badge disconnected" aria-live="polite">Déconnecté</span>
      <select id="model-select" aria-label="Modèle LLM" title="Modèle LLM">
        <option value="gpt-4o">gpt-4o</option>
      </select>
      <button id="clear-btn" type="button" aria-label="Vider l'historique" title="Vider l'historique">&#128465;</button>
    </div>
  </header>

  <!-- Écran de configuration (masqué par défaut) -->
  <div id="setup-screen" role="complementary" hidden>
    <h2>Configuration</h2>
    <label for="server-url-input">URL du serveur</label>
    <input id="server-url-input" type="url" placeholder="wss://votre-domaine/ws/vscode"
      autocomplete="off" spellcheck="false" />
    <button id="save-config-btn">Enregistrer</button>
    <p id="setup-error" class="error" aria-live="assertive"></p>
  </div>

  <!-- Écran de chat principal -->
  <main id="chat-screen">
    <div id="chat-log" role="log" aria-live="polite" aria-label="Messages"></div>
    <footer id="input-bar">
      <form id="chat-form" autocomplete="off">
        <textarea id="message-input" placeholder="Votre message…" rows="1"
          aria-label="Message" required></textarea>
        <button type="submit" id="send-btn" aria-label="Envoyer">&#9658;</button>
        <button id="stop-btn" type="button" aria-label="Arrêter la génération" hidden>&#9632;</button>
      </form>
      <button id="settings-btn" type="button" aria-label="Paramètres">&#9881;</button>
    </footer>
  </main>

  <!-- Librairies locales — pas de CDN (CSP strict) -->
  <script src="{{DOMPURIFY_URI}}" nonce="{{CSP_NONCE}}"></script>
  <script src="{{MARKED_URI}}" nonce="{{CSP_NONCE}}"></script>
  <script src="{{APP_JS_URI}}" nonce="{{CSP_NONCE}}"></script>
</body>
</html>
